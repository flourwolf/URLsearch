<!doctype html>
<html lang='en'>
    <head>
        <meta charset='utf-8'>
        <title>URL Preview</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        #urlInput {
            width: 70%;
            padding: 8px;
            font-size: 14px;
        }
        #searchButton {
            padding: 8px 16px;
            cursor: pointer;
        }
        #resultFrame {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }
    </style>
    </head>
    <body>
        <h1>URL Preview</h1>
        <p>Enter a URL here.</p>
        <input type="text" id="urlInput" placeholder="Please enter a URL">
        <button id="searchButton">Search</button>
        <iframe id="resultFrame"></iframe>
        <script>
            (function () {
              const input = document.getElementById('urlInput');
              const btn = document.getElementById('searchButton');
              const iframe = document.getElementById('resultFrame');

              function normalizeUrl(raw) {
                if (!raw) return null;
                let url = raw.trim();
                // Block dangerous schemes
                if (/^\s*javascript:/i.test(url)) return null;
                // Add https protocol if missing
                if (!/^[a-zA-Z][a-zA-Z0-9+\-.]*:/.test(url)) {
                  url = 'https://' + url;
                }
                try {
                  // Validate with URL constructor (throws exception if invalid)
                  const u = new URL(url);
                  if (!['http:', 'https:'].includes(u.protocol)) return null;
                  return u.href;
                } catch (e) {
                  return null;
                }
              }

              function loadIntoIframe() {
                const raw = input.value;
                const url = normalizeUrl(raw);
                if (!url) {
                  alert('Please enter a valid URL (http/https). JavaScript scheme is not allowed.');
                  return;
                }
                // Set iframe src
                iframe.src = url;
              }

              // Load on button click
              btn.addEventListener('click', loadIntoIframe);

              // Load on Enter key
              input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                  e.preventDefault();
                  loadIntoIframe();
                }
              });
            })();
        </script>
    </body>
</html>
